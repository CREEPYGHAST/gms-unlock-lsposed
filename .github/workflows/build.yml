name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build debug and release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Configure optional release signing
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_KEYSTORE_BASE64:-}" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
            echo "SIGNING_STORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "SIGNING_STORE_PASSWORD=$RELEASE_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "Using release signing secrets."
          else
            echo "No release signing secrets configured; release will use CI debug signing."
          fi
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Build release APK
        run: gradle :app:assembleRelease --stacktrace

      - name: Verify release APK signature
        run: |
          set -euo pipefail
          for apk in app/build/outputs/apk/release/*.apk; do
            "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$apk"
          done

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gms-unlock-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: gms-unlock-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Release ')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v1.0.0
        run: |
          set -euo pipefail
          release_apk="$(find app/build/outputs/apk/release -name '*.apk' | sort | head -n 1)"
          debug_apk="$(find app/build/outputs/apk/debug -name '*.apk' | sort | head -n 1)"
          release_asset="gms-unlock-lsposed-${TAG_NAME}-release.apk"
          debug_asset="gms-unlock-lsposed-${TAG_NAME}-debug.apk"
          notes_file="$RUNNER_TEMP/release-notes.md"

          cp "$release_apk" "$release_asset"
          cp "$debug_apk" "$debug_asset"

          cat > "$notes_file" <<'NOTES'
          Standalone LSPosed module for removing CN Google Play Services restriction feature flags from Android SystemConfig.

          - Built by GitHub Actions.
          - Includes debug and release APK assets.
          - Release APK signature is verified by apksigner before upload.

          If repository signing secrets are not configured, the release APK is signed with CI debug signing. It is installable, but configure release signing secrets for stable future updates.
          NOTES

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$release_asset" "$debug_asset" --clobber
            gh release edit "$TAG_NAME" --title "GMS Unlock LSPosed $TAG_NAME" --notes-file "$notes_file" --latest
          else
            gh release create "$TAG_NAME" "$release_asset" "$debug_asset" --title "GMS Unlock LSPosed $TAG_NAME" --notes-file "$notes_file" --target "$GITHUB_SHA" --latest
          fi
